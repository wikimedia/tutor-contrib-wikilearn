name: Release on version bump

# Whenever the package version in tutorwikilearn/__about__.py changes on master,
# cut a matching git tag and GitHub release. The tag name is the raw version
# string (e.g. "1.0.0") so it can be consumed directly as a pip/git ref
# (git+https://.../tutor-contrib-wikilearn.git@1.0.0).

on:
  push:
    branches:
      - master
    paths:
      - tutorwikilearn/__about__.py

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oE '__version__ = "[^"]+"' tutorwikilearn/__about__.py \
            | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
